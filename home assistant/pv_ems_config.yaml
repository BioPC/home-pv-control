- binary_sensor:
  - name: PV EMS PV Limited
    unique_id: pv_ems_pv_limited
    icon: mdi:solar-power-variant
    state: "{% set bad = ['unknown','unavailable','select_entity_first',''] %}\n{% set count = states('input_number.pv_ems_inverter_count')|int(1) %}\n{% set db = states('input_number.pv_ems_pv_adjust_deadband')|float(25) %}\n{% set ns = namespace(limited=false) %}\n{% for i in range(1, count + 1) %}\n  {% set ent = states('input_text.pv_ems_pv' ~ i ~ '_limit_number') %}\n  {% set full = states('input_number.pv_ems_pv' ~ i ~ '_full_limit')|float(0) %}\n  {% if ent not in bad and full > 0 and states(ent)|float(full) < (full - db) %}{% set ns.limited = true %}{% endif %}\n{% endfor %}\n{{ ns.limited }}"
  - name: PV EMS Cooldown Active
    unique_id: pv_ems_cooldown_active
    icon: mdi:timer-sand
    state: '{% set data = states(''input_text.pv_ems_last_targets_json'') | from_json(default={}) %} {{ data.get(''cooldown_active'', false) }}

      '
  - name: PV EMS Negative Price Mode
    unique_id: pv_ems_negative_price_mode
    icon: mdi:cash-minus
    state: '{% set ent = states(''input_text.pv_ems_all_in_price_sensor'') %}

      {% if ent in [''unknown'',''unavailable'',''select_entity_first'',''''] %}false{% else %}{{ states(ent)|float(999) <= 0 }}{% endif %}'
  - name: PV EMS At Minimum PV
    unique_id: pv_ems_at_minimum_pv
    icon: mdi:solar-power-variant-outline

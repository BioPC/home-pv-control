template:
- sensor:
  - name: Home PV Control Configured Inverter Count
    unique_id: pv_ems_configured_inverter_count
    icon: mdi:counter
    state: '{% set count = states(''input_number.pv_ems_inverter_count'')|int(2) %} {% set ns = namespace(total=0) %} {% if count >= 1 and states(''input_select.pv_ems_pv1_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 2 and states(''input_select.pv_ems_pv2_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 3 and states(''input_select.pv_ems_pv3_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 4 and states(''input_select.pv_ems_pv4_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 5 and states(''input_select.pv_ems_pv5_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'','''']
      %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 6 and states(''input_select.pv_ems_pv6_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 7 and states(''input_select.pv_ems_pv7_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 8 and states(''input_select.pv_ems_pv8_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 9 and states(''input_select.pv_ems_pv9_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif %} {% if count >= 10 and states(''input_select.pv_ems_pv10_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + 1 %}{% endif
      %} {{ ns.total }}'
  - name: Home PV Control Configured Full Power
    unique_id: pv_ems_configured_full_power
    unit_of_measurement: W
    icon: mdi:solar-power
    state: '{% set count = states(''input_number.pv_ems_inverter_count'')|int(2) %} {% set ns = namespace(total=0) %} {% if count >= 1 and states(''input_select.pv_ems_pv1_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv1_full_limit'')|float(0) %}{% endif %} {% if count >= 2 and states(''input_select.pv_ems_pv2_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv2_full_limit'')|float(0) %}{% endif %} {% if count >= 3 and states(''input_select.pv_ems_pv3_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv3_full_limit'')|float(0) %}{% endif %} {% if count >= 4 and states(''input_select.pv_ems_pv4_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set
      ns.total = ns.total + states(''input_number.pv_ems_pv4_full_limit'')|float(0) %}{% endif %} {% if count >= 5 and states(''input_select.pv_ems_pv5_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv5_full_limit'')|float(0) %}{% endif %} {% if count >= 6 and states(''input_select.pv_ems_pv6_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv6_full_limit'')|float(0) %}{% endif %} {% if count >= 7 and states(''input_select.pv_ems_pv7_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv7_full_limit'')|float(0) %}{% endif %} {% if count >= 8 and states(''input_select.pv_ems_pv8_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total
      + states(''input_number.pv_ems_pv8_full_limit'')|float(0) %}{% endif %} {% if count >= 9 and states(''input_select.pv_ems_pv9_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv9_full_limit'')|float(0) %}{% endif %} {% if count >= 10 and states(''input_select.pv_ems_pv10_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv10_full_limit'')|float(0) %}{% endif %} {{ ns.total|round(0) }}'
  - name: Home PV Control Configured Minimum Power
    unique_id: pv_ems_configured_minimum_power
    unit_of_measurement: W
    icon: mdi:solar-power
    state: '{% set count = states(''input_number.pv_ems_inverter_count'')|int(2) %} {% set ns = namespace(total=0) %} {% if count >= 1 and states(''input_select.pv_ems_pv1_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv1_low_limit'')|float(0) %}{% endif %} {% if count >= 2 and states(''input_select.pv_ems_pv2_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv2_low_limit'')|float(0) %}{% endif %} {% if count >= 3 and states(''input_select.pv_ems_pv3_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv3_low_limit'')|float(0) %}{% endif %} {% if count >= 4 and states(''input_select.pv_ems_pv4_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total
      = ns.total + states(''input_number.pv_ems_pv4_low_limit'')|float(0) %}{% endif %} {% if count >= 5 and states(''input_select.pv_ems_pv5_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv5_low_limit'')|float(0) %}{% endif %} {% if count >= 6 and states(''input_select.pv_ems_pv6_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv6_low_limit'')|float(0) %}{% endif %} {% if count >= 7 and states(''input_select.pv_ems_pv7_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv7_low_limit'')|float(0) %}{% endif %} {% if count >= 8 and states(''input_select.pv_ems_pv8_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv8_low_limit'')|float(0)
      %}{% endif %} {% if count >= 9 and states(''input_select.pv_ems_pv9_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv9_low_limit'')|float(0) %}{% endif %} {% if count >= 10 and states(''input_select.pv_ems_pv10_limit_number_picker'') not in [''unknown'',''unavailable'',''select_entity_first'',''''] %}{% set ns.total = ns.total + states(''input_number.pv_ems_pv10_low_limit'')|float(0) %}{% endif %} {{ ns.total|round(0) }}'
  - name: Home PV Control Target Total Limit
    unique_id: pv_ems_target_total_limit
    unit_of_measurement: W
    icon: mdi:chart-line
    state: >
      {% set data = states('input_text.pv_ems_last_targets_json') | from_json(default={}) %}
      {{ data.get('target_total', 0) | float(0) | round(0) }}
  - name: Home PV Control Debug Market Price
    unique_id: pv_ems_debug_market_price
    unit_of_measurement: €/kWh
    icon: mdi:cash
    state: '{{ states(states(''input_select.pv_ems_market_price_sensor_picker'')) | float(0) }}'
  - name: Home PV Control Debug All In Price

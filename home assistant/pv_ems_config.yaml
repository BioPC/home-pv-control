template:
- sensor:
  - name: PV EMS Debug Market Price
    unique_id: pv_ems_debug_market_price
    unit_of_measurement: €/kWh
    icon: mdi:cash
    state: '{{ states(states(''input_text.pv_ems_market_price_sensor'')) | float(0) }}'
  - name: PV EMS Debug All In Price
    unique_id: pv_ems_debug_all_in_price
    unit_of_measurement: €/kWh
    icon: mdi:cash-multiple
    state: '{{ states(states(''input_text.pv_ems_all_in_price_sensor'')) | float(0) }}'
  - name: PV EMS Debug Grid Power
    unique_id: pv_ems_debug_grid_power
    unit_of_measurement: W
    icon: mdi:transmission-tower
    state: '{{ states(states(''input_text.pv_ems_grid_power_sensor'')) | float(0) | round(0) }}'
  - name: PV EMS Debug PV Power
    unique_id: pv_ems_debug_pv_power
    unit_of_measurement: W
    icon: mdi:solar-power
    state: '{{ states(states(''input_text.pv_ems_pv_power_sensor'')) | float(0) | round(0) }}'
  - name: PV EMS Debug HBC Strategy
    unique_id: pv_ems_debug_hbc_strategy
    icon: mdi:battery-sync
    state: '{{ states(states(''input_text.pv_ems_battery_strategy_entity'')) }}'
  - name: PV EMS Last Calculation
    unique_id: pv_ems_last_calculation
    icon: mdi:calculator-variant-outline
    state: '{% set grid = states(states(''input_text.pv_ems_grid_power_sensor''))|float(0) %} {% set target = states(''input_number.pv_ems_export_stop_threshold'')|float(-25) %} {% set error = (target - grid)|round(0) %} Grid={{ grid|round(0) }}W Target={{ target|round(0) }}W Error={{ error }}W'
  - name: PV EMS PV1 Actual Limit
    unique_id: pv_ems_pv1_actual_limit
    unit_of_measurement: W
    icon: mdi:solar-panel
    state: '{% set ent = states(''input_text.pv_ems_pv1_limit_number'') %} {% if ent in [''unknown'',''unavailable'',''select_entity_first'',''''] %}unknown{% else %}{{ states(ent)|float(0)|round(0) }}{% endif %}'

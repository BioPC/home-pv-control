title: Home PV Control
views:
  - type: sections
    title: Main
    path: home-pv-control
    icon: mdi:solar-power
    max_columns: 3
    header:
      layout: center
      badges_position: top
      badges_wrap: scroll
      card:
        type: markdown
        text_only: true
        content: >-
          ## Home PV Control (v1.1.1)

          #### Standalone PV optimization for dynamic energy contracts. Optional
          HBC integration.
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_text.pv_ems_status
        name: Status
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_number.pv_ems_inverter_count
        name: Inverters
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.pv_ems_debug_hbc_strategy
        name: HBC strategy
        visibility:
          - condition: state
            entity: input_boolean.pv_ems_control_hbc_strategy
            state: "on"
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              ### 🎛️ PV Master Control
          - type: markdown
            text_only: true
            content: >-
              <ha-alert title="Standalone module" alert-type="info">Home PV
              Control works as PV-only export control. HBC is optional and can
              be enabled when a valid HBC is detected.</ha-alert>
          - type: tile
            entity: input_boolean.pv_ems_enabled
            name: Home PV Control enabled
            icon: mdi:solar-power
            hide_state: true
          - type: tile
            entity: input_boolean.pv_ems_notifications
            name: Notifications
            icon: mdi:bell-outline
            hide_state: true
          - type: tile
            entity: input_boolean.pv_ems_control_hbc_strategy
            name: Enable HBC strategy control
            icon: mdi:battery-sync
            hide_state: true
          - type: tile
            entity: input_boolean.pv_ems_debug
            name: Show debug info
            icon: mdi:bug-outline
            hide_state: true
          - type: markdown
            content: |
              ### HPVC status

              <ha-alert alert-type="info">
                <b>{{ states('input_text.pv_ems_status') }}</b>
              </ha-alert>
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_control_hbc_strategy
                state: "on"
            card:
              type: markdown
              content: |
                ### HBC status

                <ha-alert alert-type="info">
                  <b>HBC strategy:</b> {{ states('sensor.pv_ems_debug_hbc_strategy') }}
                </ha-alert>
      - type: grid
        cards:
          - type: markdown
            content: |
              ### 📡 Core Sensor Configuration
          - type: markdown
            text_only: true
            content: >-
              **Grid**: current grid power. Negative is export, positive is
              import (W).


              **Market price**: export/market price used for PV limiting
              (€/kWh).


              **All-in price**: total import price used for HBC strategy
              switching (€/kWh).


              **Solar power**: current total PV power from active inverters (W).


              Paste (Ctrl + V) the entity IDs in the fields below. 

              Example: `sensor.p1_meter_power`
          - type: entities
            entities:
              - entity: input_text.pv_ems_grid_power_sensor
                name: Grid
              - entity: input_text.pv_ems_market_price_sensor
                name: Market price
              - entity: input_text.pv_ems_all_in_price_sensor
                name: All-in price
              - entity: input_text.pv_ems_pv_power_sensor
                name: Solar power
            show_header_toggle: false
          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  ### 🧩 Optional HBC Setup

                  {% set hbc = states('input_text.pv_ems_hbc_status') %}

                  {% if hbc.startswith('HBC detected') %} <ha-alert title="HBC
                  detected" alert-type="success"> HBC strategy control is
                  available. Enable or disable it in <b>PV Master Control</b>.
                  </ha-alert> {% else %} <ha-alert title="Standalone mode"
                  alert-type="warning">No HBC was detected.

                  Enter your HBC strategy entity below to enable optional HBC
                  strategy control. </ha-alert> {% endif %}
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: input_text.pv_ems_battery_strategy_entity
                    name: HBC strategy entity
                    icon: mdi:battery-sync
      - type: grid
        cards:
          - type: markdown
            content: |
              ### 🔆 Inverter Configuration
          - type: markdown
            text_only: true
            content: >-
              Set the number of active inverter limit entities (max 10).


              For each inverter: enter the limit number entity, set full/max
              power, and set the minimum allowed power.


              Paste (Ctrl + V) the entity IDs in the fields below.
          - type: markdown
            text_only: true
            content: >-
              <ha-alert title="Negative price protection"
              alert-type="warning">When all-in price ≤ 0, PV output is reduced
              to the configured minimum limits. Set those to 0 W if you want PV
              fully off. </ha-alert>
          - type: entities
            entities:
              - entity: input_number.pv_ems_inverter_count
                name: Number of inverters
            show_header_toggle: false
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_1
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv1_limit_number
                  name: PV1 – Limit entity
                - entity: input_number.pv_ems_pv1_full_limit
                  name: PV1 Max power
                - entity: input_number.pv_ems_pv1_low_limit
                  name: PV1 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_2
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv2_limit_number
                  name: PV2 – Limit entity
                - entity: input_number.pv_ems_pv2_full_limit
                  name: PV2 Max power
                - entity: input_number.pv_ems_pv2_low_limit
                  name: PV2 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_3
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv3_limit_number
                  name: PV3 – Limit entity
                - entity: input_number.pv_ems_pv3_full_limit
                  name: PV3 Max power
                - entity: input_number.pv_ems_pv3_low_limit
                  name: PV3 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_4
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv4_limit_number
                  name: PV4 – Limit entity
                - entity: input_number.pv_ems_pv4_full_limit
                  name: PV4 Max power
                - entity: input_number.pv_ems_pv4_low_limit
                  name: PV4 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_5
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv5_limit_number
                  name: PV5 – Limit entity
                - entity: input_number.pv_ems_pv5_full_limit
                  name: PV5 Max power
                - entity: input_number.pv_ems_pv5_low_limit
                  name: PV5 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_6
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv6_limit_number
                  name: PV6 – Limit entity
                - entity: input_number.pv_ems_pv6_full_limit
                  name: PV6 Max power
                - entity: input_number.pv_ems_pv6_low_limit
                  name: PV6 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_7
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv7_limit_number
                  name: PV7 – Limit entity
                - entity: input_number.pv_ems_pv7_full_limit
                  name: PV7 Max power
                - entity: input_number.pv_ems_pv7_low_limit
                  name: PV7 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_8
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv8_limit_number
                  name: PV8 – Limit entity
                - entity: input_number.pv_ems_pv8_full_limit
                  name: PV8 Max power
                - entity: input_number.pv_ems_pv8_low_limit
                  name: PV8 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_9
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv9_limit_number
                  name: PV9 – Limit entity
                - entity: input_number.pv_ems_pv9_full_limit
                  name: PV9 Max power
                - entity: input_number.pv_ems_pv9_low_limit
                  name: PV9 Min power
          - type: conditional
            conditions:
              - entity: binary_sensor.pv_ems_show_inverter_slot_10
                state: "on"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.pv_ems_pv10_limit_number
                  name: PV10 – Limit entity
                - entity: input_number.pv_ems_pv10_full_limit
                  name: PV10 Max power
                - entity: input_number.pv_ems_pv10_low_limit
                  name: PV10 Min power
      - type: grid
        cards:
          - type: markdown
            content: |
              ### 📈 Price Strategy
          - type: markdown
            text_only: true
            content: >-
              **PV limit price**: PV limiting is allowed at or below this
              market/export price.
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_control_hbc_strategy
                state: "on"
            card:
              type: markdown
              text_only: true
              content: >-
                **Charge price**: HBC switches to Charge when all-in price is
                cheap enough.


                **Expensive price**: HBC switches to the expensive strategy when
                all-in price is high.

                 **Balanced/Expensive strategy**: HBC modes to select for those price zones.
          - type: markdown
            text_only: true
            content: >-
              **Price hysteresis**: prevents rapid switching around configured
              price thresholds.
          - type: entities
            entities:
              - entity: input_number.pv_ems_pv_limiting_price
                name: PV limit price
              - type: conditional
                conditions:
                  - entity: input_boolean.pv_ems_control_hbc_strategy
                    state: "on"
                row:
                  entity: input_number.pv_ems_battery_charge_price
                  name: Charge price
              - type: conditional
                conditions:
                  - entity: input_boolean.pv_ems_control_hbc_strategy
                    state: "on"
                row:
                  entity: input_number.pv_ems_battery_expensive_price
                  name: Expensive price
              - entity: input_number.pv_ems_battery_price_hysteresis
                name: Price hysteresis
              - type: conditional
                conditions:
                  - entity: input_boolean.pv_ems_control_hbc_strategy
                    state: "on"
                row:
                  entity: input_select.pv_ems_balanced_strategy
                  name: Balanced strategy
              - type: conditional
                conditions:
                  - entity: input_boolean.pv_ems_control_hbc_strategy
                    state: "on"
                row:
                  entity: input_select.pv_ems_expensive_strategy
                  name: Expensive strategy
            show_header_toggle: false
      - type: grid
        cards:
          - type: markdown
            content: |
              ### ⚡ Power Flow Control
          - type: markdown
            text_only: true
            content: >-
              **Export start**: start limiting when export is stronger than this
              value.


              **Target export**: export level Home PV Control tries to maintain
              while limiting.


              **Import restore**: raise PV again if the house imports too much
              while limited.


              **Min PV for control**: do not limit when solar production is
              already low.


              **Night restore**: restore full inverter limits when PV production
              is low.
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_control_hbc_strategy
                state: "on"
            card:
              type: markdown
              text_only: true
              content: >-
                **Hidden PV reveal step**: extra PV power revealed while an HBC
                battery charges. Lower = smoother, higher = faster.
          - type: entities
            entities:
              - entity: input_number.pv_ems_export_start_threshold
                name: Export start
              - entity: input_number.pv_ems_export_stop_threshold
                name: Target export
              - entity: input_number.pv_ems_import_restore_threshold
                name: Import restore
              - entity: input_number.pv_ems_pv_min_power_for_control
                name: Min PV for control
              - entity: input_number.pv_ems_pv_night_restore_power
                name: Night restore
              - type: conditional
                conditions:
                  - entity: input_boolean.pv_ems_control_hbc_strategy
                    state: "on"
                row:
                  entity: input_number.pv_ems_hidden_pv_reveal_step
                  name: Hidden PV reveal step
            show_header_toggle: false
      - type: grid
        cards:
          - type: markdown
            content: |
              ### 🎚️ Control Tuning
          - type: markdown
            text_only: true
            content: >-
              **Cooldown**: minimum time between PV limit changes (15 sec to 15
              min).


              **Deadband**: ignore small PV limit corrections so the EMS does
              not react to tiny changes.
          - type: entities
            entities:
              - entity: input_number.pv_ems_cooldown_seconds
                name: Cooldown
              - entity: input_number.pv_ems_pv_adjust_deadband
                name: Deadband
            show_header_toggle: false
  - type: sections
    title: Debug
    path: pv-ems-debug
    icon: mdi:bug-outline
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "off"
            card:
              type: markdown
              content: >
                <ha-alert title="Debug disabled" alert-type="info">

                Turn on <b>Show debug info</b> in <b>PV Master Control</b> to
                display:<br><br>

                • Decision details<br> • Live inputs<br> • Control state<br> •
                Power history<br> • BC Strategy Price Zones<br> • Insights

                </ha-alert>
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
            card:
              type: entities
              title: 💡 Decision Details
              entities:
                - entity: input_text.pv_ems_status
                  name: Status
                - entity: input_text.pv_ems_reason
                  name: Reason
                - entity: input_text.pv_ems_last_action
                  name: Last action
                - entity: sensor.pv_ems_last_calculation
                  name: Last calculation
              show_header_toggle: false
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
            card:
              type: entities
              title: 📡 Live Inputs
              entities:
                - entity: sensor.pv_ems_debug_market_price
                  name: Market price
                - entity: sensor.pv_ems_debug_all_in_price
                  name: All-in price
                - entity: sensor.pv_ems_debug_grid_power
                  name: Grid power
                - entity: sensor.pv_ems_debug_pv_power
                  name: Total solar power
                - entity: sensor.pv_ems_pv1_actual_limit
                  name: PV1 actual limit
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.pv_ems_inverter_count
                      above: 1
                  row:
                    entity: sensor.pv_ems_pv2_actual_limit
                    name: PV2 actual limit
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.pv_ems_inverter_count
                      above: 2
                  row:
                    entity: sensor.pv_ems_pv3_actual_limit
                    name: PV3 actual limit
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.pv_ems_inverter_count
                      above: 3
                  row:
                    entity: sensor.pv_ems_pv4_actual_limit
                    name: PV4 actual limit
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.pv_ems_inverter_count
                      above: 4
                  row:
                    entity: sensor.pv_ems_pv5_actual_limit
                    name: PV5 actual limit
              show_header_toggle: false
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_control_hbc_strategy
                state: "on"
              - entity: input_boolean.pv_ems_debug
                state: "on"
            card:
              type: entities
              title: 🔋 HBC Live Status
              entities:
                - entity: sensor.pv_ems_debug_hbc_strategy
                  name: HBC strategy
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 0
                  row:
                    entity: sensor.marstek_m1_battery_state_of_charge
                    name: Battery M1 SOC
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 0
                  row:
                    entity: sensor.marstek_m1_ac_power
                    name: Battery M1 power
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 1
                  row:
                    entity: sensor.marstek_m2_battery_state_of_charge
                    name: Battery M2 SOC
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 1
                  row:
                    entity: sensor.marstek_m2_ac_power
                    name: Battery M2 power
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 2
                  row:
                    entity: sensor.marstek_m3_battery_state_of_charge
                    name: Battery M3 SOC
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 2
                  row:
                    entity: sensor.marstek_m3_ac_power
                    name: Battery M3 power
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 3
                  row:
                    entity: sensor.marstek_m4_battery_state_of_charge
                    name: Battery M4 SOC
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 3
                  row:
                    entity: sensor.marstek_m4_ac_power
                    name: Battery M4 power
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 4
                  row:
                    entity: sensor.marstek_m5_battery_state_of_charge
                    name: Battery M5 SOC
                - type: conditional
                  conditions:
                    - condition: numeric_state
                      entity: input_number.house_battery_count
                      above: 4
                  row:
                    entity: sensor.marstek_m5_ac_power
                    name: Battery M5 power
              show_header_toggle: false
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
            card:
              type: entities
              title: ⚙️ Control State
              entities:
                - entity: binary_sensor.pv_ems_pv_limited
                  name: PV limited
                - entity: binary_sensor.pv_ems_cooldown_active
                  name: Cooldown active
                - entity: binary_sensor.pv_ems_negative_price_mode
                  name: Negative price mode
                - entity: binary_sensor.pv_ems_at_minimum_pv
                  name: At minimum PV
              show_header_toggle: false
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
            card:
              type: history-graph
              entities:
                - entity: sensor.pv_ems_debug_grid_power
                  name: Grid power
                - entity: sensor.pv_ems_debug_pv_power
                  name: Total solar power
              title: 📈 Power History
              hours_to_show: 4
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
              - entity: input_boolean.pv_ems_control_hbc_strategy
                state: "on"
            card:
              type: custom:apexcharts-card
              header:
                show: true
                show_states: false
                title: 💰 HBC Strategy Price Zones
              graph_span: 48h
              span:
                start: day
              now:
                show: true
                color: "#009ac7"
                label: Now
              apex_config:
                plotOptions:
                  bar:
                    borderRadius: 2
                    columnWidth: 90%
                legend:
                  show: false
                xaxis:
                  type: datetime
                  labels:
                    datetimeUTC: false
                    format: HH:mm
                    rotate: -45
                    rotateAlways: true
                yaxis:
                  decimalsInFloat: 3
                  title:
                    text: €/kWh
                tooltip:
                  x:
                    format: ddd dd MMM HH:mm
                  "y":
                    formatter: |
                      EVAL:function(value) {
                        return Number(value).toFixed(3) + ' €/kWh';
                      }
              series:
                - entity: sensor.hbc_energy_prices_data
                  name: Price
                  type: column
                  float_precision: 3
                  show:
                    legend_value: false
                  data_generator: >
                    const marks = entity.attributes.marks || [];

                    const charge =
                    parseFloat(hass.states['input_number.pv_ems_battery_charge_price']?.state);

                    const expensive =
                    parseFloat(hass.states['input_number.pv_ems_battery_expensive_price']?.state);

                    const chargePrice = Number.isFinite(charge) ? charge : 0.10;

                    const expensivePrice = Number.isFinite(expensive) ?
                    expensive : 0.25;

                    const today = new Date(); today.setHours(0, 0, 0, 0);

                    const tomorrow = new Date(today);
                    tomorrow.setDate(tomorrow.getDate() + 1);

                    const colorForPrice = (price, isNow) => {
                      if (isNow) return '#009ac7';
                      if (price < 0) return '#e53935';
                      if (price <= chargePrice) return '#4caf50';
                      if (price < expensivePrice) return '#fff107';
                      return '#ff9800';
                    };

                    return marks.map(iv => {
                      const rawPrice = Number(iv.price);
                      const price = Math.abs(rawPrice) > 5 ? rawPrice / 100 : rawPrice;

                      const start = new Date(iv.start);
                      const isTomorrow = start >= tomorrow;

                      let color = colorForPrice(price, iv.is_now);

                      // Make tomorrow's bars semi-transparent (≈27% opacity)
                      if (isTomorrow) {
                        color += '60';
                      }

                      return {
                        x: start.getTime(),
                        y: price,
                        fillColor: color
                      };
                    });
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
              - entity: input_boolean.pv_ems_control_hbc_strategy
                state: "on"
            card:
              type: markdown
              content: >-
                🔴 **Negative** ≤ €0/kWh 🟢 **Charge** ≤ €{{
                states('input_number.pv_ems_battery_charge_price') | float(0.10)
                | round(3) }}/kWh

                🟡 **{{ states ('input_select.pv_ems_balanced_strategy')}}** €{{
                states('input_number.pv_ems_battery_charge_price') | float(0.10)
                | round(3) }}–€{{
                states('input_number.pv_ems_battery_expensive_price') |
                float(0.25) | round(3) }}/kWh 🟠 **{{
                states('input_select.pv_ems_expensive_strategy')}}** ≥ €{{
                states('input_number.pv_ems_battery_expensive_price') |
                float(0.25) | round(3) }}/kWh
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.pv_ems_debug
                state: "on"
            card:
              type: markdown
              title: 📋 Insights
              content: >-
                | Time |  | Flow | Node | Explanation |

                |---|---|---|---|---|

                {% for e in [
                  'input_text.pv_ems_insight_1',
                  'input_text.pv_ems_insight_2',
                  'input_text.pv_ems_insight_3',
                  'input_text.pv_ems_insight_4',
                  'input_text.pv_ems_insight_5',
                  'input_text.pv_ems_insight_6',
                  'input_text.pv_ems_insight_7',
                  'input_text.pv_ems_insight_8',
                  'input_text.pv_ems_insight_9',
                  'input_text.pv_ems_insight_10',
